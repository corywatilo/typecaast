name: Render smoke

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: render-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  render:
    name: render a short config to MP4
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Headless Chrome (chrome-headless-shell) system libraries.
      - name: Install Chrome dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libdbus-1-3 libatk1.0-0 libgbm1 libasound2t64 \
            libxrandr2 libxkbcommon0 libxfixes3 libxcomposite1 libxdamage1 \
            libatk-bridge2.0-0 libpango-1.0-0 libcairo2 libcups2

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Render quick.json → MP4
        run: node packages/cli/dist/index.js render examples/quick.json --out /tmp/quick.mp4

      - name: Assert the MP4 was written
        run: test -s /tmp/quick.mp4 && echo "✓ rendered $(wc -c < /tmp/quick.mp4) bytes"

      - name: Upload the rendered video
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quick-render
          path: /tmp/quick.mp4
          if-no-files-found: ignore
