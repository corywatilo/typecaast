name: Release

# Changesets release automation. Opens/updates a "Version Packages" PR;
# merging that PR publishes the changed packages to npm.
#
# Manual (`workflow_dispatch`) for now. To make it run on every push to master,
# first: (1) enable repo Settings → Actions → "Allow GitHub Actions to create
# and approve pull requests", and (2) add the NPM_TOKEN secret (§29). Then add
# the `push: branches: [master]` trigger back.
on:
  workflow_dispatch:

concurrency: release-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write # npm provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org"
      - run: pnpm install --frozen-lockfile
      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
