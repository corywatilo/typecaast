name: Release

# Changesets release automation. On push to master it opens/updates a
# "Version Packages" PR; **merging that PR** publishes the changed packages to
# npm. Auth is npm **Trusted Publishing (OIDC)** — no long-lived token: the
# `id-token: write` permission lets pnpm exchange a GitHub OIDC token for npm
# credentials, validated against each package's configured trusted publisher
# (this repo + this workflow file). Provenance is attached automatically.
on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency: release-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write # OIDC trusted publishing + provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      # Node ≥22.14 required for npm OIDC trusted publishing.
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: "https://registry.npmjs.org"
      - run: pnpm install --frozen-lockfile
      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          commit: "chore: version packages"
          title: "chore: version packages"
        # No NPM_TOKEN: publishing authenticates via OIDC (trusted publishing).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
